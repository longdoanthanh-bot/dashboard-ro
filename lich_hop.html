<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#080c1f;color:#e0e4f0;min-height:100vh;padding:16px 24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.nav{display:flex;align-items:center;gap:10px}
.nav-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#a0a8c4;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.nav-btn:hover{background:rgba(99,130,255,.2);color:#fff;border-color:rgba(99,130,255,.4)}
.month-title{font-size:20px;font-weight:600;color:#fff}
.today-btn{background:rgba(99,130,255,.15);border:1px solid rgba(99,130,255,.3);color:#7b9cff;padding:5px 14px;border-radius:8px;cursor:pointer;font-size:12.5px;font-family:inherit;font-weight:500;transition:.2s}
.today-btn:hover{background:rgba(99,130,255,.3);color:#fff}
.updated{text-align:center;padding:4px;font-size:10.5px;color:#4ecb71;margin-bottom:8px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.day-header{background:rgba(255,255,255,.04);padding:9px 6px;text-align:center;font-size:12.5px;font-weight:600;color:#7b8ab5;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.08)}
.day-header:not(:last-child){border-right:1px solid rgba(255,255,255,.06)}
.day-header.sun{color:#ff6b6b}
.cell{min-height:105px;padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.06);border-right:1px solid rgba(255,255,255,.06);position:relative;transition:background .2s}
.cell:nth-child(7n){border-right:none}
.cell:hover{background:rgba(255,255,255,.02)}
.cell.empty{background:rgba(0,0,0,.15)}
.cell.today{box-shadow:inset 0 0 0 2px #4070ff;background:rgba(64,112,255,.06)}
.date-num{font-size:12.5px;font-weight:500;color:#8892b5;margin-bottom:3px}
.cell.sun .date-num{color:#ff6b6b}
.cell.today .date-num{color:#7ba4ff;font-weight:700}
.ev{font-size:10px;padding:2.5px 5px;margin-bottom:2px;border-radius:3px;line-height:1.3;cursor:pointer;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;display:block}
.ev:hover{filter:brightness(1.2);transform:translateX(2px)}
.ev-time{font-weight:600;margin-right:3px}
.ev.meeting{background:rgba(240,160,48,.18);color:#f0a030;border-left:3px solid #f0a030}
.ev.allday{background:rgba(255,255,255,.06);color:#a0a8c4;border-left:3px solid #6b7394}
.tooltip{position:fixed;background:#1a2040;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;font-size:12px;color:#d0d4e8;z-index:100;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:340px;opacity:0;transition:opacity .15s}
.tooltip.show{opacity:1}
.tooltip .tt-title{font-weight:600;margin-bottom:5px;font-size:13px;color:#f0a030}
.tooltip .tt-row{margin-bottom:2px;display:flex;gap:6px}
.tooltip .tt-label{color:#6b7394;min-width:65px}
.stats{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.stat-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 18px;text-align:center}
.stat-num{font-size:20px;font-weight:700;margin-bottom:1px;color:#f0a030}
.stat-label{font-size:10px;color:#6b7394;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>

<div class="calendar" id="cal"></div>
<div class="stats" id="stats"></div>
<div class="tooltip" id="tt"></div>
<script>
const DAYS=["Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7","CN"];
const MN=["Tháng 1","Tháng 2","Tháng 3","Tháng 4","Tháng 5","Tháng 6","Tháng 7","Tháng 8","Tháng 9","Tháng 10","Tháng 11","Tháng 12"];
let cY,cM;
const now=new Date();
const todayStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");

let EVENTS = [];

function parseEvents(rawList) {
  return rawList.map(function(ev){
    var start=ev.start||"",end=ev.end||"",isAllDay=start.indexOf("T")<0;
    var date,time="",endTime="";
    if(isAllDay){date=start}
    else{var dt=new Date(start);
      date=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
      time=String(dt.getHours()).padStart(2,"0")+":"+String(dt.getMinutes()).padStart(2,"0");
      if(end){var edt=new Date(end);endTime=String(edt.getHours()).padStart(2,"0")+":"+String(edt.getMinutes()).padStart(2,"0")}
    }
    return{date:date,time:time,endTime:endTime,title:ev.summary||"(Không tiêu đề)",
      location:ev.location||"",description:ev.description||"",
      attendees:(ev.attendees||[]).join(", "),
      htmlLink:ev.html_link||"",isAllDay:isAllDay,type:isAllDay?"allday":"meeting"};
  });
}

// Initialize with static fallback data
EVENTS = parseEvents(RAW_EVENTS);

function goToday(){cY=now.getFullYear();cM=now.getMonth();render()}
function chgMonth(d){cM+=d;if(cM>11){cM=0;cY++}if(cM<0){cM=11;cY--}render()}

function render(){
  var cal=document.getElementById("cal");cal.innerHTML="";
  DAYS.forEach(function(d,i){var h=document.createElement("div");h.className="day-header"+(i===6?" sun":"");h.textContent=d;cal.appendChild(h)});
  var f=new Date(cY,cM,1),sd=f.getDay();sd=sd===0?6:sd-1;
  var dim=new Date(cY,cM+1,0).getDate();
  for(var i=0;i<sd;i++){var c=document.createElement("div");c.className="cell empty";cal.appendChild(c)}
  for(var d=1;d<=dim;d++){
    var ds=cY+"-"+String(cM+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var dow=(sd+d-1)%7,isT=ds===todayStr,isS=dow===6;
    var cell=document.createElement("div");
    cell.className="cell"+(isT?" today":"")+(isS?" sun":"");
    var num=document.createElement("div");num.className="date-num";num.textContent=d;cell.appendChild(num);
    EVENTS.filter(function(m){return m.date===ds}).sort(function(a,b){
      if(a.isAllDay&&!b.isAllDay)return -1;if(!a.isAllDay&&b.isAllDay)return 1;
      return(a.time||"").localeCompare(b.time||"");
    }).forEach(function(m){
      var ev=document.createElement("a");
      ev.className="ev "+m.type;
      ev.innerHTML=m.time?"<span class='ev-time'>"+m.time+"</span>"+m.title:m.title;
      if(m.htmlLink){ev.href=m.htmlLink;ev.target="_blank"}
      ev.onmouseenter=function(e){showTT(e,m)};ev.onmouseleave=hideTT;
      cell.appendChild(ev);
    });
    cal.appendChild(cell);
  }
  var tot=sd+dim,rem=tot%7;
  if(rem>0)for(var i=0;i<7-rem;i++){var c=document.createElement("div");c.className="cell empty";cal.appendChild(c)}
  document.getElementById("mTitle").textContent=MN[cM]+", "+cY;
  var ms=EVENTS.filter(function(m){var p=m.date.split("-").map(Number);return p[0]===cY&&p[1]===cM+1});
  var st=document.getElementById("stats");st.innerHTML="";
  if(ms.length>0){var b=document.createElement("div");b.className="stat-box";
    b.innerHTML="<div class='stat-num'>"+ms.length+"</div><div class='stat-label'>Sự kiện trong tháng</div>";
    st.appendChild(b)}
}

function showTT(e,m){
  var tt=document.getElementById("tt");
  var timeStr=m.isAllDay?"Cả ngày":(m.endTime?m.time+" → "+m.endTime:m.time);
  var html="<div class='tt-title'>"+m.title+"</div>";
  html+="<div class='tt-row'><span class='tt-label'>🕐 Giờ:</span>"+timeStr+"</div>";
  html+="<div class='tt-row'><span class='tt-label'>📅 Ngày:</span>"+m.date.split("-").reverse().join("/")+"</div>";
  if(m.location)html+="<div class='tt-row'><span class='tt-label'>📍 Nơi:</span>"+m.location+"</div>";
  if(m.attendees)html+="<div class='tt-row'><span class='tt-label'>👥 Dự:</span>"+m.attendees.substring(0,120)+"</div>";
  tt.innerHTML=html;
  tt.style.left=Math.min(e.clientX+12,window.innerWidth-360)+"px";
  tt.style.top=(e.clientY+12)+"px";tt.classList.add("show");
}
function hideTT(){document.getElementById("tt").classList.remove("show")}

// Auto-fetch live data from Trợ Lý AI server
async function fetchLive() {
  var btn = document.getElementById('btnRefresh');
  var label = document.getElementById('updatedLabel');
  try {
    btn.textContent = '⏳'; btn.disabled = true;
    label.textContent = '⏳ Đang tải từ server...';
    label.style.color = '#f0a030';
    var resp = await fetch('http://localhost:8080/api/calendar/week?days=90', {signal: AbortSignal.timeout(8000)});
    var data = await resp.json();
    if (data.events && data.events.length > 0) {
      EVENTS = parseEvents(data.events);
      var ts = new Date();
      var tsStr = String(ts.getDate()).padStart(2,'0')+'-'+String(ts.getMonth()+1).padStart(2,'0')+'-'+ts.getFullYear()+' '+String(ts.getHours()).padStart(2,'0')+':'+String(ts.getMinutes()).padStart(2,'0');
      label.textContent = '✅ Live: ' + tsStr + ' (' + data.events.length + ' sự kiện)';
      label.style.color = '#4ecb71';
      render();
    }
  } catch(e) {
    label.textContent = '⚠️ Server không khả dụng — dùng dữ liệu tĩnh';
    label.style.color = '#ff6b6b';
    console.log('Calendar fetch failed:', e);
  } finally {
    btn.textContent = '🔄'; btn.disabled = false;
  }
}

// Initial render with static data, then try live fetch
cY=now.getFullYear();cM=now.getMonth();render();
fetchLive();
</script>
