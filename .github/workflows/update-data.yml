name: Update Dashboard Data

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/**'
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      DATA_DIR: ${{ github.workspace }}/data
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Check khu vuc
        run: python check_khuvuc.py
        continue-on-error: true

      - name: Check ST
        run: python check_st.py
        continue-on-error: true

      - name: Update store data
        run: python update_store_data.py

      - name: Update Excel data
        run: python update_excel_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html tele.html tasks.html data/ || true
          TIMESTAMP=$(TZ='Asia/Ho_Chi_Minh' date +'%d/%m/%Y %H:%M')
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto update $TIMESTAMP"
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git push origin $BRANCH
          if [ "$BRANCH" = "master" ]; then git push origin master:main || true; fi
          if [ "$BRANCH" = "main" ]; then git push origin main:master || true; fi
