<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📬 Telegram Inbox — Thư Ký AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f1117; --bg2: #1a1b2e; --bg3: #232440;
    --card: #1e1f35; --border: rgba(255,255,255,0.08);
    --text: #e8e8f0; --text2: #9898b0; --text3: #6a6a82;
    --blue: #6c8cff; --purple: #a78bfa; --green: #34d399;
    --red: #f87171; --yellow: #fbbf24; --orange: #fb923c;
    --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow:hidden; }
body::before { content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(108,140,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 20%, rgba(167,139,250,0.04) 0%, transparent 50%);
    z-index:0; pointer-events:none; }

/* ===== HEADER ===== */
.page-header {
    position:relative; z-index:10; padding:12px 24px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border); backdrop-filter:blur(20px); background:rgba(15,17,23,0.9);
}
.page-header-left { display:flex; align-items:center; gap:12px; }
.page-header-left h1 { font-size:18px; font-weight:700;
    background:linear-gradient(135deg,var(--text),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.page-header-sub { font-size:10px; color:var(--text3); margin-top:1px; }
.header-actions { display:flex; gap:6px; align-items:center; }
.btn {
    padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg3);
    color:var(--text2); font-size:11px; font-weight:600; font-family:inherit; cursor:pointer;
    display:flex; align-items:center; gap:5px; transition:all .2s; text-decoration:none;
}
.btn:hover { border-color:var(--blue); color:var(--text); transform:translateY(-1px); }
.btn-primary { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-primary:hover { background:#5a7af0; }
.btn-green { background:rgba(52,211,153,0.1); color:var(--green); border-color:rgba(52,211,153,0.25); }
.btn-green:hover { background:rgba(52,211,153,0.25); }
.btn-red { background:rgba(248,113,113,0.08); color:var(--red); border-color:rgba(248,113,113,0.2); }
.btn-red:hover { background:rgba(248,113,113,0.2); }
.badge { background:var(--blue); color:#fff; font-size:11px; font-weight:700; padding:2px 10px; border-radius:12px; min-width:24px; text-align:center; }
.badge-pulse { animation: badgePulse 2s ease infinite; }
@keyframes badgePulse { 0%,100%{box-shadow:0 0 0 0 rgba(108,140,255,0.4)} 50%{box-shadow:0 0 0 6px rgba(108,140,255,0)} }

/* Live indicator */
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block;
    animation: livePulse 1.5s ease infinite; margin-right:4px; }
@keyframes livePulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,211,153,0.5)} 50%{opacity:0.6;box-shadow:0 0 0 4px rgba(52,211,153,0)} }
.live-label { font-size:10px; color:var(--green); font-weight:600; display:flex; align-items:center; }

/* ===== STATS BAR ===== */
.stats-bar { display:flex; gap:12px; padding:10px 24px; border-bottom:1px solid var(--border); background:rgba(26,27,46,0.3); position:relative; z-index:1; }
.stat-chip { display:flex; align-items:center; gap:6px; padding:4px 12px; border-radius:8px; background:rgba(255,255,255,0.03); border:1px solid var(--border); }
.stat-chip .num { font-size:16px; font-weight:800; }
.stat-chip .lbl { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:.3px; }

/* ===== MAIN LAYOUT ===== */
.main { position:relative; z-index:1; display:flex; height:calc(100vh - 100px); }

/* Sidebar */
.sidebar { width:360px; min-width:280px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:rgba(26,27,46,0.3); }
.sidebar-header { padding:10px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sidebar-title { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
.filter-chips { display:flex; gap:4px; }
.chip {
    padding:4px 10px; border-radius:14px; border:1px solid var(--border); background:transparent;
    color:var(--text3); font-size:10px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .2s;
}
.chip:hover { border-color:var(--blue); color:var(--text); }
.chip.active { background:var(--blue); color:#fff; border-color:var(--blue); }

.chat-list { flex:1; overflow-y:auto; }
.chat-list::-webkit-scrollbar { width:4px; }
.chat-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

.type-header { padding:8px 16px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; display:flex; align-items:center; gap:6px;
    border-top:1px solid var(--border); margin-top:4px; }
.type-header:first-child { border-top:none; margin-top:0; }
.type-count { font-size:9px; padding:1px 6px; border-radius:8px; background:rgba(255,255,255,0.06); }

.chat-item {
    padding:10px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:all .15s;
    border-left:3px solid transparent;
}
.chat-item:hover { background:rgba(108,140,255,0.05); }
.chat-item.active { background:rgba(108,140,255,0.1); border-left-color:var(--blue); }
.chat-item.unread { }
.chat-item .chat-name { font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
.chat-item .chat-preview { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.chat-item .chat-meta { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
.chat-item .chat-time { font-size:10px; color:var(--text3); }
.chat-item .chat-badge { font-size:10px; font-weight:700; padding:1px 7px; border-radius:8px; color:#fff; min-width:20px; text-align:center; }
.chat-item .type-tag { font-size:8px; font-weight:700; padding:1px 5px; border-radius:4px; text-transform:uppercase; }
.tag-dm { background:rgba(52,211,153,0.15); color:var(--green); }
.tag-mention { background:rgba(108,140,255,0.15); color:var(--blue); }
.tag-reply { background:rgba(251,191,36,0.15); color:var(--yellow); }

/* Detail panel */
.detail { flex:1; display:flex; flex-direction:column; }
.detail-header {
    padding:12px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;
    background:rgba(26,27,46,0.3); min-height:52px;
}
.detail-header h3 { font-size:15px; font-weight:700; }
.detail-header .sub { font-size:11px; color:var(--text3); margin-top:1px; }
.detail-actions { display:flex; gap:6px; }

.messages { flex:1; overflow-y:auto; padding:16px 24px; display:flex; flex-direction:column; gap:6px; }
.messages::-webkit-scrollbar { width:4px; }
.messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

.msg {
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px;
    animation:msgIn .25s ease;
}
.msg.new-msg { border-left:3px solid var(--blue); animation:msgNew .5s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
@keyframes msgNew { 0%{background:rgba(108,140,255,0.15)} 100%{background:var(--card)} }

.msg-header { display:flex; align-items:center; gap:8px; margin-bottom:3px; }
.msg-sender { font-size:12px; font-weight:700; color:var(--blue); }
.msg-time { font-size:10px; color:var(--text3); }
.msg-type-badge { font-size:8px; font-weight:700; padding:1px 5px; border-radius:4px; text-transform:uppercase; }
.msg-text { font-size:12.5px; color:var(--text2); line-height:1.6; word-break:break-word; }
.msg-media { font-size:11px; color:var(--purple); margin-top:3px; display:flex; align-items:center; gap:4px; }
.msg-read-status { font-size:9px; color:var(--text3); margin-left:auto; }

/* Context messages (older messages for context) */
.msg-context { opacity:0.5; border-left:2px solid var(--border); padding-left:12px; }
.msg-context .msg-sender { color:var(--text3); }
.context-divider { text-align:center; font-size:10px; color:var(--text3); padding:6px 0; display:flex; align-items:center; gap:8px; }
.context-divider::before, .context-divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* Empty state */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text3); gap:8px; }
.empty .icon { font-size:40px; opacity:0.4; }
.empty p { font-size:13px; }

/* Toast */
.toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:10px 18px; font-size:12px; font-weight:600; color:var(--text);
    box-shadow:0 8px 32px rgba(0,0,0,.5); z-index:1000;
    animation:msgIn .3s ease; transition:opacity .3s;
}

/* Scanning indicator */
.scanning { display:none; align-items:center; gap:6px; padding:6px 12px; font-size:10px; color:var(--yellow); }
.scanning.active { display:flex; }
.scanning .spinner { width:12px; height:12px; border:2px solid rgba(251,191,36,0.3); border-top-color:var(--yellow); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

@media (max-width:800px) {
    .main { flex-direction:column; }
    .sidebar { width:100%; height:40vh; border-right:none; border-bottom:1px solid var(--border); }
    .detail { height:60vh; }
    .stats-bar { flex-wrap:wrap; gap:6px; padding:8px 16px; }
}
</style>
</head>
<body>

<header class="page-header">
    <div class="page-header-left">
        <div>
            <h1>📬 Telegram Inbox</h1>
            <div class="page-header-sub">Thư Ký AI — DM · Tag tôi · Trả lời tôi</div>
        </div>
    </div>
    <div class="header-actions">
        <div class="scanning" id="scanIndicator">
            <div class="spinner"></div>
            <span>Đang quét...</span>
        </div>
        <div class="live-label"><span class="live-dot"></span> <span id="liveStatus">Live 15s</span></div>
        <span class="badge" id="totalBadge">--</span>
        <button class="btn btn-primary" onclick="loadMentions(true)">🔄 Quét mới</button>
        <a href="/" class="btn">← Dashboard</a>
    </div>
</header>

<div class="stats-bar">
    <div class="stat-chip"><div class="num" style="color:var(--green)" id="sDm">0</div><div class="lbl">Nhắn riêng</div></div>
    <div class="stat-chip"><div class="num" style="color:var(--blue)" id="sMention">0</div><div class="lbl">Tag tôi</div></div>
    <div class="stat-chip"><div class="num" style="color:var(--yellow)" id="sReply">0</div><div class="lbl">Trả lời</div></div>
    <div class="stat-chip"><div class="num" style="color:var(--text)" id="sTotal">0</div><div class="lbl">Tổng</div></div>
    <div style="margin-left:auto;font-size:10px;color:var(--text3);display:flex;align-items:center;" id="scanTime"></div>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Hội thoại (<span id="chatCount">0</span>)</span>
            <div class="filter-chips">
                <button class="chip active" data-filter="all" onclick="setFilter(this)">Tất cả</button>
                <button class="chip" data-filter="dm" onclick="setFilter(this)">👤 DM</button>
                <button class="chip" data-filter="mention" onclick="setFilter(this)">🏷️ Tag</button>
                <button class="chip" data-filter="reply" onclick="setFilter(this)">↩️ Reply</button>
            </div>
        </div>
        <div class="chat-list" id="chatList">
            <div class="empty"><div class="icon">⏳</div><p>Đang tải...</p></div>
        </div>
    </div>
    <div class="detail" id="detailPanel">
        <div class="empty"><div class="icon">👈</div><p>Chọn cuộc trò chuyện bên trái</p></div>
    </div>
</div>

<script>
// Auto-detect API: nếu trên GitHub Pages, thử kết nối server Thư Ký AI
const _isGitHub = window.location.hostname.includes('github.io');
const _serverUrl = 'http://localhost:8080';
let API = _isGitHub ? _serverUrl + '/api' : window.location.origin + '/api';
let _serverConnected = false;
let allMentions = [];
let currentFilter = 'all';
let selectedGroup = null;
let _loading = false;
let _lastCount = 0;
let _pollInterval = null;
let _errorCount = 0;

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function toast(msg) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}

// ===== TYPE HELPERS =====
function isDm(t) { return t === 'direct_message'; }
function isReply(t) { return t === 'reply_to_me'; }
function isMention(t) { return !isDm(t) && !isReply(t); }

function getTypeInfo(t) {
    if (isDm(t)) return { label:'DM', cls:'tag-dm', group:'dm', color:'var(--green)', icon:'👤' };
    if (isReply(t)) return { label:'Reply', cls:'tag-reply', group:'reply', color:'var(--yellow)', icon:'↩️' };
    return { label:'Tag', cls:'tag-mention', group:'mention', color:'var(--blue)', icon:'🏷️' };
}

// ===== LOAD MENTIONS =====
async function loadMentions(force=false) {
    if (_loading && !force) return;
    _loading = true;
    const indicator = document.getElementById('scanIndicator');
    indicator.classList.add('active');

    try {
        const param = force ? '&force=1' : '';
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), force ? 120000 : 30000);
        const r = await fetch(API + '/telegram/mentions?hours=48' + param, {signal: ctrl.signal});
        clearTimeout(timer);
        const data = await r.json();

        if (!data.available) {
            document.getElementById('chatList').innerHTML =
                '<div class="empty"><div class="icon">🔐</div><p>'+esc(data.message||'Chưa cấu hình Telegram')+'</p></div>';
            _loading = false;
            indicator.classList.remove('active');
            return;
        }

        const newMentions = data.mentions || [];
        const hasNew = newMentions.length !== _lastCount;
        allMentions = newMentions;
        _lastCount = allMentions.length;
        _errorCount = 0;

        // Update stats
        const dms = allMentions.filter(m => isDm(m.mention_type));
        const mentions = allMentions.filter(m => isMention(m.mention_type));
        const replies = allMentions.filter(m => isReply(m.mention_type));
        document.getElementById('sDm').textContent = dms.length;
        document.getElementById('sMention').textContent = mentions.length;
        document.getElementById('sReply').textContent = replies.length;
        document.getElementById('sTotal').textContent = allMentions.length;

        const badge = document.getElementById('totalBadge');
        badge.textContent = allMentions.length;
        badge.classList.toggle('badge-pulse', allMentions.length > 0);

        // Scan time
        const now = new Date();
        document.getElementById('scanTime').textContent = '🔄 ' + now.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

        renderChatList();

        // Re-select current chat if still exists
        if (selectedGroup) {
            const filtered = getFilteredMentions();
            const groups = groupByChat(filtered);
            if (groups[selectedGroup]) {
                selectChat(selectedGroup, true); // silent re-render
            }
        }

        if (force) toast('✅ Quét xong — ' + allMentions.length + ' tin nhắn');
        if (hasNew && !force && allMentions.length > 0) {
            // New messages arrived during poll
            document.title = `(${allMentions.length}) 📬 Telegram Inbox`;
        }
    } catch(e) {
        _errorCount++;
        if (_errorCount <= 2) {
            // Silent retry
        } else {
            toast('⚠️ ' + (e.name === 'AbortError' ? 'Timeout' : e.message));
        }
    } finally {
        _loading = false;
        indicator.classList.remove('active');
    }
}

// ===== FILTER & GROUP =====
function getFilteredMentions() {
    if (currentFilter === 'all') return allMentions;
    if (currentFilter === 'dm') return allMentions.filter(m => isDm(m.mention_type));
    if (currentFilter === 'mention') return allMentions.filter(m => isMention(m.mention_type));
    if (currentFilter === 'reply') return allMentions.filter(m => isReply(m.mention_type));
    return allMentions;
}

function groupByChat(mentions) {
    const groups = {};
    for (const m of mentions) {
        const key = m.group || m.chat_id || 'unknown';
        if (!groups[key]) groups[key] = { name: m.group, chatId: m.chat_id, msgs: [], types: new Set(), latestDate: '' };
        groups[key].msgs.push(m);
        groups[key].types.add(m.mention_type);
        if (m.date > groups[key].latestDate) groups[key].latestDate = m.date;
    }
    return groups;
}

// ===== RENDER CHAT LIST =====
function renderChatList() {
    const filtered = getFilteredMentions();
    const groups = groupByChat(filtered);
    const el = document.getElementById('chatList');

    const chatKeys = Object.keys(groups);
    document.getElementById('chatCount').textContent = chatKeys.length;

    if (!chatKeys.length) {
        el.innerHTML = '<div class="empty"><div class="icon">✅</div><p>Không có tin nhắn liên quan</p></div>';
        return;
    }

    // Sort by latest date desc
    chatKeys.sort((a,b) => (groups[b].latestDate || '').localeCompare(groups[a].latestDate || ''));

    // Group by type category
    const byCategory = { dm:[], mention:[], reply:[] };
    for (const key of chatKeys) {
        const g = groups[key];
        if (g.types.has('direct_message')) byCategory.dm.push(key);
        else if (g.types.has('reply_to_me')) byCategory.reply.push(key);
        else byCategory.mention.push(key);
    }

    const catConfig = {
        dm: { label:'👤 Tin nhắn riêng', color:'var(--green)' },
        mention: { label:'🏷️ Tag tôi', color:'var(--blue)' },
        reply: { label:'↩️ Trả lời tôi', color:'var(--yellow)' },
    };

    let html = '';
    for (const [cat, keys] of Object.entries(byCategory)) {
        if (!keys.length) continue;
        const totalMsgs = keys.reduce((s, k) => s + groups[k].msgs.length, 0);
        html += `<div class="type-header" style="color:${catConfig[cat].color}">${catConfig[cat].label} <span class="type-count">${totalMsgs}</span></div>`;

        for (const key of keys) {
            const g = groups[key];
            const last = g.msgs[0];
            const isActive = selectedGroup === key;
            const unreadCount = g.msgs.filter(m => !m.is_read).length;
            const typeInfo = getTypeInfo(last.mention_type);
            const badgeColor = unreadCount > 0 ? catConfig[cat].color : 'var(--text3)';

            html += `<div class="chat-item${isActive?' active':''}" onclick="selectChat('${esc(key)}')" style="${isActive?'border-left-color:'+catConfig[cat].color:''}">
                <div class="chat-name">${esc(g.name)} <span class="type-tag ${typeInfo.cls}">${typeInfo.label}</span></div>
                <div class="chat-preview">${esc(last.sender)}: ${esc((last.text||'').slice(0,50))}</div>
                <div class="chat-meta">
                    <span class="chat-time">${esc(last.date)}</span>
                    <span class="chat-badge" style="background:${badgeColor}">${g.msgs.length}</span>
                </div>
            </div>`;
        }
    }
    el.innerHTML = html;
}

// ===== SELECT CHAT =====
async function selectChat(groupKey, silent=false) {
    selectedGroup = groupKey;
    if (!silent) renderChatList(); // update active state

    const filtered = getFilteredMentions();
    const groups = groupByChat(filtered);
    const g = groups[groupKey];
    if (!g) return;

    const panel = document.getElementById('detailPanel');
    const typeInfo = getTypeInfo(g.msgs[0].mention_type);
    const unreadCount = g.msgs.filter(m => !m.is_read).length;

    let html = `<div class="detail-header">
        <div>
            <h3>${esc(g.name)}</h3>
            <div class="sub">${g.msgs.length} tin nhắn${unreadCount > 0 ? ' · '+unreadCount+' chưa đọc' : ''}</div>
        </div>
        <div class="detail-actions">
            <button class="btn btn-green" onclick="markRead('${g.chatId}')">✅ Đã đọc</button>
            <button class="btn" onclick="loadContext('${g.chatId}', ${g.msgs.length})">💬 Xem context</button>
        </div>
    </div>
    <div class="messages" id="msgContainer">`;

    // Render messages (newest first in data, show oldest first visually)
    const sorted = [...g.msgs].reverse();
    for (const m of sorted) {
        const ti = getTypeInfo(m.mention_type);
        const readIcon = m.is_read ? '<span class="msg-read-status">✓ đã đọc</span>' : '<span class="msg-read-status" style="color:var(--yellow)">● mới</span>';
        html += `<div class="msg${!m.is_read?' new-msg':''}">
            <div class="msg-header">
                <span class="msg-sender">${esc(m.sender)}</span>
                <span class="msg-type-badge ${ti.cls}">${ti.label}</span>
                <span class="msg-time">${esc(m.date)}</span>
                ${readIcon}
            </div>
            <div class="msg-text">${esc(m.text)}</div>
            ${m.has_media ? '<div class="msg-media">📎 Media đính kèm</div>' : ''}
        </div>`;
    }

    html += '</div>';
    panel.innerHTML = html;

    // Auto-scroll to bottom
    const container = document.getElementById('msgContainer');
    if (container) container.scrollTop = container.scrollHeight;

    // Mark as read on Telegram (DMs only)
    if (g.chatId && g.types.has('direct_message')) {
        fetch(API + `/telegram/read/${g.chatId}`, {method:'POST'}).catch(()=>{});
    }
}

// ===== LOAD CONTEXT (older messages) =====
async function loadContext(chatId, existingCount) {
    if (!chatId) { toast('⚠️ Không có chat_id'); return; }
    try {
        const limit = Math.min(existingCount + 10, 30);
        const r = await fetch(API + `/telegram/messages/${chatId}?limit=${limit}`);
        const data = await r.json();
        if (!data.available || !data.messages?.length) { toast('⚠️ Không tải được context'); return; }

        const container = document.getElementById('msgContainer');
        if (!container) return;

        // Build context HTML (prepend before existing messages)
        const existingMsgIds = new Set(allMentions.filter(m => String(m.chat_id) === String(chatId)).map(m => m.msg_id));
        const contextMsgs = data.messages.filter(m => !existingMsgIds.has(m.id)).reverse();

        if (!contextMsgs.length) { toast('📭 Không có tin nhắn context thêm'); return; }

        let contextHtml = '<div class="context-divider">Tin nhắn trước đó</div>';
        for (const m of contextMsgs) {
            contextHtml += `<div class="msg msg-context">
                <div class="msg-header">
                    <span class="msg-sender">${esc(m.sender)}</span>
                    <span class="msg-time">${esc(m.date)}</span>
                </div>
                <div class="msg-text">${esc(m.text || '(media/sticker)')}</div>
                ${m.media ? '<div class="msg-media">📎 Media</div>' : ''}
            </div>`;
        }
        contextHtml += '<div class="context-divider">Tin nhắn liên quan đến bạn</div>';

        container.insertAdjacentHTML('afterbegin', contextHtml);
        toast('📬 Đã tải ' + contextMsgs.length + ' tin context');
    } catch(e) {
        toast('❌ Lỗi: ' + e.message);
    }
}

// ===== MARK AS READ =====
async function markRead(chatId) {
    if (!chatId) return;
    try {
        await fetch(API + `/telegram/read/${chatId}`, {method:'POST'});
        // Mark locally
        for (const m of allMentions) {
            if (String(m.chat_id) === String(chatId)) m.is_read = true;
        }
        renderChatList();
        if (selectedGroup) selectChat(selectedGroup, true);
        toast('✅ Đã đánh dấu đã đọc');
    } catch(e) {
        toast('❌ ' + e.message);
    }
}

// ===== FILTER =====
function setFilter(el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentFilter = el.dataset.filter;
    selectedGroup = null;
    document.getElementById('detailPanel').innerHTML = '<div class="empty"><div class="icon">👈</div><p>Chọn cuộc trò chuyện bên trái</p></div>';
    renderChatList();
}

// ===== REAL-TIME POLLING =====
async function checkServer() {
    try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 3000);
        const r = await fetch(API + '/telegram', { signal: ctrl.signal });
        const data = await r.json();
        _serverConnected = true;
        return true;
    } catch(e) {
        _serverConnected = false;
        return false;
    }
}

function showOfflineScreen() {
    document.getElementById('chatList').innerHTML = `
        <div class="empty" style="padding:30px 20px;gap:12px;">
            <div class="icon">🔌</div>
            <p style="font-size:14px;font-weight:600;color:var(--text);">Chưa kết nối Server</p>
            <p style="font-size:11px;text-align:center;line-height:1.6;">
                Trang này cần server <b>Thư Ký AI</b> đang chạy.<br>
                Mở terminal và chạy:
            </p>
            <code style="background:var(--bg3);padding:8px 16px;border-radius:8px;font-size:11px;color:var(--yellow);border:1px solid var(--border);">
                python script_main_server.py
            </code>
            <p style="font-size:10px;color:var(--text3);margin-top:4px;">
                Server: ${_serverUrl}<br>
                Đang thử kết nối lại mỗi 5s...
            </p>
        </div>`;
    document.getElementById('liveStatus').innerHTML = '<span style="color:var(--red);">⚫ Offline</span>';
    document.getElementById('totalBadge').textContent = '--';
}

async function startPolling() {
    // Check server connectivity
    const connected = await checkServer();
    if (!connected && _isGitHub) {
        showOfflineScreen();
        // Keep retrying every 5s
        const retryInterval = setInterval(async () => {
            const ok = await checkServer();
            if (ok) {
                clearInterval(retryInterval);
                document.getElementById('liveStatus').innerHTML = '<span class="live-dot"></span> <span>Live 15s</span>';
                loadMentions();
                _pollInterval = setInterval(() => loadMentions(false), 15000);
            }
        }, 5000);
        return;
    }

    // Initial load
    loadMentions();

    // Poll every 15 seconds for near real-time
    _pollInterval = setInterval(() => {
        loadMentions(false);
    }, 15000);

    // Also listen for page visibility changes
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            // Slow down when tab is hidden
            clearInterval(_pollInterval);
            _pollInterval = setInterval(() => loadMentions(false), 60000);
            document.getElementById('liveStatus').textContent = 'Idle 60s';
        } else {
            // Speed up when tab is visible
            clearInterval(_pollInterval);
            loadMentions(false); // immediate refresh
            _pollInterval = setInterval(() => loadMentions(false), 15000);
            document.getElementById('liveStatus').textContent = 'Live 15s';
            document.title = '📬 Telegram Inbox — Thư Ký AI';
        }
    });
}

// ===== INIT =====
startPolling();
</script>
