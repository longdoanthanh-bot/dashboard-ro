:root {

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;

.main{position:relative;z-index:1;display:flex;height:100vh}

.filter-row{display:flex;align-items:center;gap:4px}
.filter-chip{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:transparent;

.filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.chat-list{flex:1;overflow-y:auto}
.type-header{padding:8px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.chat-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.chat-item:hover{background:rgba(108,140,255,0.05)}
.chat-item.active{background:rgba(108,140,255,0.1);border-left-color:var(--blue)}
.chat-item.is-read{opacity:0.45}
.chat-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
.chat-preview{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.chat-time{font-size:10px;color:var(--text3)}
.chat-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;background:var(--blue);color:#fff}

.detail{flex:1;display:flex;flex-direction:column}
.detail-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(26,27,46,0.3)}
.detail-header h3{font-size:15px;font-weight:700}
.detail-header .sub{font-size:11px;color:var(--text3);margin-top:1px}
.messages{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:8px}
.msg{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;animation:fadeIn .2s ease}
.msg.is-read{opacity:0.6}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.msg-sender{font-size:12px;font-weight:700;color:var(--blue)}
.msg-time{font-size:10px;color:var(--text3)}
.msg-type-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px}
.tag-dm{background:rgba(52,211,153,0.15);color:var(--green)}
.tag-reply{background:rgba(108,140,255,0.15);color:var(--blue)}
.tag-mention{background:rgba(251,191,36,0.15);color:var(--yellow)}
.tag-group{background:rgba(167,139,250,0.12);color:var(--purple)}
.msg-text{font-size:12px;color:var(--text2);line-height:1.5;word-break:break-word}
.msg-media{font-size:10px;color:var(--purple);margin-top:4px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3)}
.empty .icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:13px}

.header-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:800px){

    .sidebar{width:100%;height:40vh;border-right:none;border-bottom:1px solid var(--border)}

</style>

const READ_KEY = 'tele_read_v2';
let readChats = {};
try { readChats = JSON.parse(localStorage.getItem(READ_KEY) || '{}'); } catch(e) {}
function saveRead() { try { localStorage.setItem(READ_KEY, JSON.stringify(readChats)); } catch(e) {} }
function isChatRead(id) { return !!readChats[id]; }
function markRead(id) { readChats[id] = Date.now(); saveRead(); }

let currentFilter = 'all';
let selectedChatId = null;

function escHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function getFiltered() {
    if (currentFilter === 'dm') return ALL_CHATS.filter(c => c.type === 'dm');
    if (currentFilter === 'group') return ALL_CHATS.filter(c => c.type !== 'dm');
    if (currentFilter === 'unread') return ALL_CHATS.filter(c => !isChatRead(c.id));
    return ALL_CHATS;
}

function renderList() {
    const chats = getFiltered();
    const el = document.getElementById('chatList');
    document.getElementById('chatCount').textContent = chats.length;

    if (!chats.length) {
        el.innerHTML = '<div class="empty"><div class="icon">✅</div><p>Không có tin nhắn</p></div>';
        return;
    }

    const groups = { dm:[], group:[], channel:[] };
    chats.forEach(c => (groups[c.type] || groups.group).push(c));

    const labels = { dm:'👤 Tin nhắn riêng', group:'👥 Nhóm', channel:'📢 Kênh' };
    const colors = { dm:'var(--green)', group:'var(--blue)', channel:'var(--purple)' };

    let html = '';
    for (const [type, items] of Object.entries(groups)) {
        if (!items.length) continue;
        const total = items.reduce((s,c) => s + c.messages.length, 0);
        html += `<div class="type-header" style="color:${colors[type]}">${labels[type]} (${total})</div>`;
        for (const chat of items) {
            const last = chat.messages[0];
            const isActive = selectedChatId === chat.id;
            const isRead = isChatRead(chat.id);
            const preview = (last.sender + ': ' + (last.text||'').slice(0,50)).slice(0,60);
            html += `<div class="chat-item${isActive?' active':''}${isRead?' is-read':''}" onclick="selectChat('${chat.id}')" style="border-left-color:${colors[type]}">
                <div class="chat-name">${escHtml(chat.name)}${isRead?' <span style=color:var(--green);font-size:10px>✓</span>':''}</div>
                <div class="chat-preview">${escHtml(preview)}</div>
                <div class="chat-meta">
                    <span class="chat-time">${last.date}</span>
                    <span class="chat-badge">${chat.messages.length}</span>
                </div>
            </div>`;
        }
    }
    el.innerHTML = html;
}

    selectedChatId = chatId;

            }
        </div>
    </div>
    <div class="messages">`;

    for (const m of chat.messages) {
        const tc = tagCls[m.msgType] || '';
        const tl = tagLbl[m.msgType] || '';
        html += `<div class="msg${isRead?' is-read':''}">
            <div class="msg-header">
                <span class="msg-sender">${escHtml(m.sender)}</span>
                <span class="msg-time">${m.date}</span>
                ${tc ? `<span class="msg-type-tag ${tc}">${tl}</span>` : ''}
            </div>
            <div class="msg-text">${escHtml(m.text)}</div>
            ${m.hasMedia && m.chatId && m.msgId ? `<div class="msg-media"><img src="${API_BASE}/api/telegram/media/${m.chatId}/${m.msgId}" alt="media" loading="lazy" style="max-width:100%;max-height:300px;border-radius:8px;margin-top:4px;cursor:pointer" onerror="this.outerHTML='<span>📎 Media</span>'" onclick="window.open(this.src,&apos;_blank&apos;)"></div>` : m.hasMedia ? '<div class="msg-media">📎 Media</div>' : ''}
        </div>`;
    }

    html += '</div>';
    panel.innerHTML = html;
}

function dismissChat(id) { markRead(id); renderList(); selectChat(id); }
function unreadChat(id) { delete readChats[id]; saveRead(); renderList(); selectChat(id); }

function setFilter(mode) {
    currentFilter = mode;
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    document.getElementById(mode==='dm'?'fDm':mode==='group'?'fGroup':mode==='unread'?'fUnread':'fAll').classList.add('active');
    selectedChatId = null;
    document.getElementById('detailPanel').innerHTML = '<div class="empty"><div class="icon">👈</div><p>Chọn cuộc trò chuyện bên trái</p></div>';
    renderList();
}

renderList();
let _cd = 300;
setInterval(() => { _cd--; if(_cd<0) return; if(_cd===0){ window.location.href = location.pathname + '?t=' + Date.now(); return; } const m=Math.floor(_cd/60),s=_cd%60; document.getElementById('countdown').textContent = '🔄 '+m+':'+String(s).padStart(2,'0'); }, 1000);

async function reloadTele() {
    const btn = document.getElementById('btnRefresh');
    btn.disabled = true;
    // On HTTPS (GitHub Pages), can't call localhost API
    if (location.protocol === 'https:') {
        btn.textContent = '🔄 Đang tải...';
        window.location.href = location.pathname + '?t=' + Date.now();
        return;
    }
    btn.textContent = '⏳ Đang quét...';
    try {
        const r1 = await fetch(API_BASE + '/api/telegram/all-unread?force=1', {signal: AbortSignal.timeout(10000)});
        const d1 = await r1.json();
        const oldScan = d1.last_scan || '';
        btn.textContent = '⏳ Quét TG...0s';
        let freshData = null;
        const t0 = Date.now();
        while (Date.now() - t0 < 180000) {
            await new Promise(r => setTimeout(r, 8000));
            btn.textContent = '⏳ Quét TG...' + Math.floor((Date.now()-t0)/1000) + 's';
            try {
                const r2 = await fetch(API_BASE + '/api/telegram/all-unread', {signal: AbortSignal.timeout(10000)});
                const d2 = await r2.json();
                if (d2.last_scan && d2.last_scan !== oldScan) { freshData = d2; break; }
            } catch(e2) {}
        }
        if (!freshData) {
            const r3 = await fetch(API_BASE + '/api/telegram/all-unread', {signal: AbortSignal.timeout(10000)});
            freshData = await r3.json();
        }
        btn.textContent = '⏳ Đang xử lý...';
        // Start from existing data (history) so we MERGE, not replace
        const chatsMap = {};
        for (const old of ALL_CHATS) {
            chatsMap[old.id] = {id:old.id, name:old.name, type:old.type, messages: old.messages.map(m => ({...m, _mid: m.msgId||0}))  };
        }
        const allChats = freshData.chats || {};
        for (const [cid, chat] of Object.entries(allChats)) {
            const msgs = chat.messages || [];
            if (!msgs.length) continue;
            const cType = chat.type || 'group';
            const name = chat.name || String(cid);
            const key = 'chat_' + cid;
            if (cType === 'dm') {
                if (!chatsMap[key]) chatsMap[key] = {id:key, name:name, type:'dm', messages:[]};
                const eids = new Set(chatsMap[key].messages.map(m=>m._mid));
                for (const m of msgs) {
                    if (!eids.has(m.msg_id||0)) {
                        chatsMap[key].messages.push({sender:m.sender||'',text:m.text||'',date:m.date||'',msgType:'dm',hasMedia:m.has_media||false,_mid:m.msg_id||0});
                    }
                }
            } else {
                const rel = msgs.filter(m => {
                    const t = (m.text||'').toLowerCase();
                    return USER_TAGS_JS.some(tag => t.includes(tag.toLowerCase()));
                });
                if (rel.length) {
                    if (!chatsMap[key]) chatsMap[key] = {id:key, name:name, type:cType, messages:[]};
                    const eids = new Set(chatsMap[key].messages.map(m=>m._mid));
                    for (const m of rel) {
                        if (!eids.has(m.msg_id||0)) {
                            chatsMap[key].messages.push({sender:m.sender||'',text:m.text||'',date:m.date||'',msgType:'mention',hasMedia:m.has_media||false,_mid:m.msg_id||0});
                        }
                    }
                }
            }
        }
        const result = Object.values(chatsMap);
        for (const c of result) {
            c.messages.forEach(m => delete m._mid);
            c.messages.sort((a,b) => b.date.localeCompare(a.date));
        }
        result.sort((a,b) => (b.messages[0]?.date||'').localeCompare(a.messages[0]?.date||''));
        ALL_CHATS.length = 0;
        ALL_CHATS.push(...result);
        const now = new Date();
        const st = String(now.getDate()).padStart(2,'0')+'/'+String(now.getMonth()+1).padStart(2,'0')+' '
            +String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
        document.querySelector('.scan-time').innerHTML = '🕐 ' + st + ' · <span id="countdown"></span>';
        _cd = 300;
        selectedChatId = null;
        document.getElementById('detailPanel').innerHTML = '<div class="empty"><div class="icon">👈</div><p>Chọn cuộc trò chuyện bên trái</p></div>';
        renderList();
        btn.textContent = '✅ Đã tải!';
        setTimeout(() => { btn.textContent = '🔄 Tải mới'; btn.disabled = false; }, 2000);
    } catch(e) {
        btn.textContent = '🔄 Đang reload...';
        window.location.href = location.pathname + '?t=' + Date.now();
    }
}
</script>
