<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📬 Telegram Inbox — Thư Ký AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f1117; --bg2: #1a1b2e; --bg3: #232440;
    --card: #1e1f35; --border: rgba(255,255,255,0.08);
    --text: #e8e8f0; --text2: #9898b0; --text3: #6a6a82;
    --blue: #6c8cff; --purple: #a78bfa; --green: #34d399;
    --red: #f87171; --yellow: #fbbf24; --orange: #fb923c;
    --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before { content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(108,140,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 20%, rgba(167,139,250,0.04) 0%, transparent 50%);
    z-index:0; pointer-events:none; }

.page-header {
    position:relative; z-index:1; padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border); backdrop-filter:blur(20px); background:rgba(15,17,23,0.8);
}
.page-header-left h1 { font-size:20px; font-weight:700; display:flex; align-items:center; gap:8px; }
.page-header-left h1 .hicon { font-size:22px; }
.page-header-sub { font-size:11px; color:var(--text3); margin-top:2px; }
.header-actions { display:flex; gap:6px; align-items:center; }
.header-btn {
    padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg3);
    color:var(--text2); font-size:11px; font-weight:600; font-family:inherit; cursor:pointer;
    display:flex; align-items:center; gap:5px; transition:all .2s;
}
.header-btn:hover { border-color:var(--blue); color:var(--text); }
.badge { background:var(--red); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; min-width:20px; text-align:center; }

.main { position:relative; z-index:1; display:flex; height:calc(100vh - 65px); }
.sidebar { width:380px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:rgba(26,27,46,0.5); }
.sidebar-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sidebar-title { font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
.filter-chips { display:flex; gap:4px; }
.filter-chip {
    padding:4px 10px; border-radius:14px; border:1px solid var(--border); background:transparent;
    color:var(--text3); font-size:10px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .2s;
}
.filter-chip:hover { border-color:var(--blue); color:var(--text); }
.filter-chip.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.chat-list { flex:1; overflow-y:auto; }
.type-header { padding:8px 16px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
.chat-item {
    padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:all .15s;
    border-left:3px solid transparent;
}
.chat-item:hover { background:rgba(108,140,255,0.05); }
.chat-item.active { background:rgba(108,140,255,0.1); border-left-color:var(--blue); }
.chat-name { font-size:13px; font-weight:600; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:300px; }
.chat-preview { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-meta { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
.chat-time { font-size:10px; color:var(--text3); }
.chat-badge { font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; background:var(--blue); color:#fff; }
.chat-tag { font-size:9px; font-weight:600; padding:1px 5px; border-radius:4px; margin-left:6px; }
.tag-dm { background:rgba(52,211,153,0.15); color:var(--green); }
.tag-reply { background:rgba(108,140,255,0.15); color:var(--blue); }
.tag-mention { background:rgba(251,191,36,0.15); color:var(--yellow); }

.detail { flex:1; display:flex; flex-direction:column; }
.detail-header {
    padding:14px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;
    background:rgba(26,27,46,0.3);
}
.detail-header h3 { font-size:15px; font-weight:700; }
.detail-header .sub { font-size:11px; color:var(--text3); margin-top:1px; }
.messages { flex:1; overflow-y:auto; padding:16px 24px; display:flex; flex-direction:column; gap:8px; }
.msg {
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 16px;
    animation:fadeIn .2s ease;
}
.msg.is-read { opacity:0.6; }
.msg-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.msg-sender { font-size:12px; font-weight:700; color:var(--blue); }
.msg-time { font-size:10px; color:var(--text3); }
.msg-type-tag { font-size:9px; font-weight:600; padding:1px 5px; border-radius:4px; }
.msg-text { font-size:12px; color:var(--text2); line-height:1.5; word-break:break-word; }
.msg-reply-ref { font-size:10px; color:var(--text3); margin-bottom:4px; padding:4px 8px; border-left:2px solid var(--blue); background:rgba(108,140,255,0.05); border-radius:0 4px 4px 0; }
.msg-media { font-size:10px; color:var(--purple); margin-top:4px; }
.unread-dot { width:8px; height:8px; border-radius:50%; background:var(--yellow); display:inline-block; }

.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text3); }
.empty .icon { font-size:40px; margin-bottom:10px; }
.empty p { font-size:13px; }

.toast {
    position:fixed; bottom:30px; right:30px;
    background:var(--bg3); border:1px solid var(--border); border-radius:10px;
    padding:12px 20px; font-size:12px; font-weight:600; color:var(--text);
    box-shadow:0 8px 32px rgba(0,0,0,.5); z-index:1000;
    animation:fadeIn .3s ease; transition:opacity .3s;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

@media (max-width:800px) {
    .main { flex-direction:column; }
    .sidebar { width:100%; height:40vh; border-right:none; border-bottom:1px solid var(--border); }
    .detail { height:60vh; }
}
.chat-item.is-read { opacity:0.45; }
.chat-item.is-read .chat-badge { background:var(--text3); }
.btn-reload { padding:4px 10px; border:1px solid var(--border); border-radius:6px; background:rgba(108,140,255,0.1);
    color:var(--blue); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .2s; white-space:nowrap; }
.btn-reload:hover { background:var(--blue); color:#fff; }
.btn-reload.loading { opacity:0.5; pointer-events:none; }
</style>
</head>
<body>

<div class="main" style="height:100vh;">
    <div class="sidebar">
        <div class="sidebar-header">
            <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:4px;">
                <span class="sidebar-title">Hội thoại (<span id="chatCount">0</span>)</span>
                <button class="btn-reload" id="btnReload" onclick="reloadTele()">🔄 Tải mới</button>
            </div>
            <div class="filter-chips">
                <button class="filter-chip active" id="fRelevant" onclick="setFilter('relevant')">🎯 Liên quan</button>
                <button class="filter-chip" id="fAll" onclick="setFilter('all')">📋 Tất cả</button>
                <button class="filter-chip" id="fUnread" onclick="setFilter('unread')">🔴 Chưa đọc</button>
            </div>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>
    <div class="detail" id="detailPanel">
        <div class="empty"><div class="icon">👈</div><p>Chọn cuộc trò chuyện bên trái</p></div>
    </div>
</div>

<script>
function goToTab(tabId) {
    try {
        if (window.parent && typeof window.parent.switchMain === 'function') {
            window.parent.switchMain(tabId);
            return;
        }
    } catch(e) {}
    if (tabId === 'tonkho' || tabId === 'thuhoi' || tabId === 'storemap') {
        location.href = './index.html';
    } else {
        location.href = tabId + '.html';
    }
}

// ===== LIVE FETCH FROM TRỢ LÝ AI =====
const API_BASE = 'http://localhost:8080';
let ALL_CHATS = [];
let isLiveData = false;

async function fetchTelegramData() {
    const btn = document.getElementById('btnReload');
    if (btn) { btn.classList.add('loading'); btn.textContent = '⏳ Đang tải...'; }
    
    try {
        const res = await fetch(API_BASE + '/api/telegram/messages', {
            signal: AbortSignal.timeout(8000)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        
        if (Array.isArray(data) && data.length > 0) {
            ALL_CHATS = data;
            isLiveData = true;
            if (btn) { btn.textContent = '✅ Live (' + data.length + ' nhóm)'; }
            showToast('✅ Đã tải ' + data.length + ' nhóm từ server');
        } else {
            throw new Error('Empty data');
        }
    } catch(e) {
        console.warn('Live fetch failed:', e.message);
        // Try cache from localStorage
        try {
            const cached = JSON.parse(localStorage.getItem('tele_chat_history') || '[]');
            if (cached.length > 0) {
                ALL_CHATS = cached;
                if (btn) { btn.textContent = '📦 Cache (' + cached.length + ' nhóm)'; }
            } else {
                if (btn) { btn.textContent = '⚠️ Không có dữ liệu'; }
            }
        } catch(e2) {
            if (btn) { btn.textContent = '⚠️ Lỗi'; }
        }
    }
    
    if (btn) { btn.classList.remove('loading'); }
    
    // Save to cache
    try {
        localStorage.setItem('tele_chat_history', JSON.stringify(ALL_CHATS));
    } catch(e) {}
    
    renderChatList();
}

async function reloadTele() {
    const btn = document.getElementById('btnReload');
    if (btn) { btn.classList.add('loading'); btn.textContent = '⏳ Quét mới...'; }
    
    try {
        // Trigger force scan
        await fetch(API_BASE + '/api/telegram/all-unread?force=1', {
            signal: AbortSignal.timeout(5000)
        });
    } catch(e) {}
    
    // Wait for scan then fetch new data
    if (btn) { btn.textContent = '⏳ Đang tải dữ liệu...'; }
    setTimeout(async () => {
        await fetchTelegramData();
    }, 3000);
}

// HISTORY_KEY merge is handled inside fetchTelegramData()

const READ_KEY = 'tele_read_chats';
let readChats = {};
try { readChats = JSON.parse(localStorage.getItem(READ_KEY) || '{}'); } catch(e) {}

function saveRead() { try { localStorage.setItem(READ_KEY, JSON.stringify(readChats)); } catch(e) {} }
function isChatRead(chatId) { return !!readChats[chatId]; }
function markRead(chatId) { readChats[chatId] = Date.now(); saveRead(); }

let currentFilter = 'relevant';
let selectedChatId = null;

function escHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function getFilteredChats() {
    let result = ALL_CHATS;
    if (currentFilter === 'relevant') {
        result = ALL_CHATS.filter(chat => {
            if (chat.type === 'dm') return true;
            return chat.messages.some(m => m.msgType === 'reply' || m.msgType === 'mention' || m.msgType === 'dm');
        }).map(chat => {
            if (chat.type === 'dm') return chat;
            const filtered = chat.messages.filter(m => m.msgType === 'reply' || m.msgType === 'mention' || m.msgType === 'dm');
            return { ...chat, messages: filtered.length > 0 ? filtered : chat.messages };
        });
    } else if (currentFilter === 'unread') {
        result = ALL_CHATS.filter(c => !isChatRead(c.id));
    }
    return result;
}

function renderChatList() {
    const chats = getFilteredChats();
    const el = document.getElementById('chatList');
    const unreadCount = chats.reduce((s,c) => s + (isChatRead(c.id) ? 0 : c.messages.length), 0);

    const totalBadgeEl = document.getElementById('totalBadge');
    if (totalBadgeEl) totalBadgeEl.textContent = unreadCount;
    document.getElementById('chatCount').textContent = chats.length;

    if (!chats.length) {
        el.innerHTML = '<div class="empty"><div class="icon">✅</div><p>Không có tin nhắn mới</p></div>';
        return;
    }

    const groups = { dm:[], group:[], channel:[] };
    chats.forEach(c => { (groups[c.type] || groups.group).push(c); });

    const typeLabels = { dm:'👤 Tin nhắn riêng', group:'👥 Nhóm', channel:'📢 Kênh' };
    const typeColors = { dm:'var(--green)', group:'var(--blue)', channel:'var(--purple)' };

    let html = '';
    for (const [type, items] of Object.entries(groups)) {
        if (!items.length) continue;
        const total = items.reduce((s,c) => s + c.messages.length, 0);
        html += `<div class="type-header" style="color:${typeColors[type]}">${typeLabels[type]} (${total})</div>`;
        for (const chat of items) {
            const last = chat.messages[chat.messages.length - 1];
            const isActive = selectedChatId === chat.id;
            const isRead = isChatRead(chat.id);
            const preview = last.sender + ': ' + (last.text || '').slice(0,50) + (last.text && last.text.length > 50 ? '...' : '');
            const readCls = isRead ? ' is-read' : '';
            html += `<div class="chat-item${isActive?' active':''}${readCls}" onclick="selectChat('${chat.id}')" style="border-left-color:${typeColors[type]}">
                <div class="chat-name">${escHtml(chat.name)}${isRead ? ' <span style="color:var(--green);font-size:10px;">✓</span>' : ''}</div>
                <div class="chat-preview">${escHtml(preview)}</div>
                <div class="chat-meta">
                    <span class="chat-time">${last.date}</span>
                    <span class="chat-badge">${chat.messages.length}</span>
                </div>
            </div>`;
        }
    }
    el.innerHTML = html;
}

function selectChat(chatId) {
    selectedChatId = chatId;

    // Auto-mark as read when opening chat
    if (!isChatRead(chatId)) {
        markRead(chatId);
    }

    renderChatList();

    const chats = getFilteredChats();
    const chat = chats.find(c => c.id === chatId) || ALL_CHATS.find(c => c.id === chatId);
    if (!chat) return;

    const panel = document.getElementById('detailPanel');
    const typeTag = { dm:'tag-dm', reply:'tag-reply', mention:'tag-mention' };
    const typeLabel = { dm:'Nhắn riêng', reply:'Trả lời', mention:'Tag tôi', general:'Chung' };
    const isRead = isChatRead(chatId);

    let html = `<div class="detail-header">
        <div>
            <h3>${escHtml(chat.name)}</h3>
            <div class="sub">${chat.messages.length} tin nhắn${isRead ? ' · ✅ Đã đọc' : ''}</div>
        </div>
        <div style="display:flex;gap:6px;">
            ${!isRead ? `<button class="header-btn" onclick="dismissChat('${chatId}')" style="background:rgba(52,211,153,0.1);color:var(--green);border-color:rgba(52,211,153,0.3);">✅ Đã đọc</button>` : `<button class="header-btn" onclick="unreadChat('${chatId}')" style="background:rgba(251,191,36,0.1);color:var(--yellow);border-color:rgba(251,191,36,0.3);">🔔 Chưa đọc</button>`}
        </div>
    </div>
    <div class="messages">`;

    for (const m of chat.messages) {
        const tag = typeTag[m.msgType] || '';
        const label = typeLabel[m.msgType] || '';
        html += `<div class="msg${isRead ? ' is-read' : ''}">
            ${m.replyRef ? `<div class="msg-reply-ref">↩ ${escHtml(m.replyRef)}</div>` : ''}
            <div class="msg-header">
                <span class="msg-sender">${escHtml(m.sender)}</span>
                <span class="msg-time">${m.date}</span>
                ${tag ? `<span class="msg-type-tag ${tag}">${label}</span>` : ''}
            </div>
            <div class="msg-text">${escHtml(m.text)}</div>
            ${m.hasMedia ? '<div class="msg-media">📎 Media</div>' : ''}
        </div>`;
    }

    html += '</div>';
    panel.innerHTML = html;
}

function dismissChat(chatId) {
    markRead(chatId);
    showToast('✅ Đã đánh dấu đã đọc');
    renderChatList();
    selectChat(chatId);
}

function unreadChat(chatId) {
    delete readChats[chatId];
    saveRead();
    showToast('🔔 Đã đánh dấu chưa đọc');
    renderChatList();
    selectChat(chatId);
}

function setFilter(mode) {
    currentFilter = mode;
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    document.getElementById(mode === 'relevant' ? 'fRelevant' : mode === 'unread' ? 'fUnread' : 'fAll').classList.add('active');
    selectedChatId = null;
    document.getElementById('detailPanel').innerHTML = '<div class="empty"><div class="icon">👈</div><p>Chọn cuộc trò chuyện bên trái</p></div>';
    renderChatList();
}

function showToast(msg) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2500);
}

fetchTelegramData();
</script>
</body>
</html>
